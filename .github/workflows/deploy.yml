name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Actions 탭에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      - name: 빌드
        env:
          # 실제 값은 레포 Settings > Secrets and variables > Actions 에 등록합니다.
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_AWARDS_SHEET_CSV_URL: ${{ secrets.VITE_AWARDS_SHEET_CSV_URL }}
          VITE_MEMBERS_SHEET_CSV_URL: ${{ secrets.VITE_MEMBERS_SHEET_CSV_URL }}
          VITE_FAQ_SHEET_CSV_URL: ${{ secrets.VITE_FAQ_SHEET_CSV_URL }}
        run: npm run build

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
