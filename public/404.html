<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>투빅스 ToBig'S</title>
  <script type="text/javascript">
    // GitHub Pages는 서버 라우팅이 없어서 /curriculum 같은 주소로 직접 들어오거나
    // 새로고침하면 404.html이 대신 뜹니다. 이 스크립트가 실제 경로를 저장해두고
    // index.html로 리다이렉트하면, index.html에서 다시 원래 경로로 복원합니다.
    // (rafgraph/spa-github-pages 방식)
    var segmentCount = 0; // 커스텀 도메인 루트(/)에 배포하는 경우 0으로 둡니다.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
